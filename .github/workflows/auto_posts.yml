
# ============================================================
# GitHub Actions — Auto WordPress Post Creator v17
# Runs every day at 10:00 AM IST (India Standard Time)
# IST = UTC + 5:30  →  10:00 AM IST = 04:30 UTC
#
# Script publishes 2 posts with 2 hour real gap between each.
# Total runtime = ~2 hours → timeout set to 180 minutes (21 hours)
# ============================================================

name: Auto WordPress Posts

on:
  schedule:
    - cron: "45 4 * * *"   # 04:30 UTC = 10:00 AM IST every day

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      posts:
        description: "Number of posts to create"
        required: false
        default: "2"
      dry_run:
        description: "Dry run? (true/false)"
        required: false
        default: "false"

jobs:
  run-auto-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 10 posts x 2 hours = 20 hours + 1 hour buffer

    steps:
      # ── 1. Checkout repo ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests

      # ── 4. Restore used_keywords.txt from cache ────────────
      - name: Restore used keywords cache
        uses: actions/cache@v4
        with:
          path: used_keywords.txt
          key: used-keywords-${{ github.run_id }}
          restore-keys: |
            used-keywords-

      # ── 5. Run the script ──────────────────────────────────
      - name: Run auto_posts.py
        env:
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          POSTS="${{ github.event.inputs.posts || '2' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY" = "true" ]; then
            python auto_posts.py --posts "$POSTS" --dry-run
          else
            python auto_posts.py --posts "$POSTS"
          fi

      # ── 6. Upload logs ─────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-posts-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      # ── 7. Commit used_keywords.txt back to repo ───────────
      - name: Commit used_keywords.txt
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_keywords.txt || true
          git diff --cached --quiet || git commit -m "chore: update used_keywords.txt [skip ci]"
          git push
